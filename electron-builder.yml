appId: com.ocworkforces.amphetamine
productName: Amphetamine

# === COMPRESSION ===
# Use maximum compression for distribution builds
compression: maximum

directories:
  output: dist
  buildResources: build

files:
  - lib/**/*
  - src/assets/!(*Template).png
  - package.json
  - assets/**/*
  - "!**/*.map"
  - "!**/node_modules"

# === ELECTRON LOCALES ===
# Only keep English (saves ~5-10MB)
electronLanguages:
  - en

mac:
  target:
    - target: dmg
      arch:
        - arm64
        - x64
    - target: zip
      arch:
        - arm64
        - x64
  # Apple Silicon + Intel support
  minimumSystemVersion: "11.0.0"
  mergeASARs: false
  # hardenedRuntime is intentionally DISABLED.
  # Electron's V8 renderer requires JIT + unsigned executable memory (see
  # build/entitlements.mac.plist: com.apple.security.cs.allow-jit and
  # com.apple.security.cs.allow-unsigned-executable-memory). Enabling hardened runtime
  # without notarization (notarize: false) would cause Gatekeeper to reject the app on
  # first launch for many users. Re-enable ONLY together with notarization + JIT entitlements.
  hardenedRuntime: false
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.inherit.plist
  extendInfo:
    LSUIElement: true
  notarize: false

# === DMG-SPECIFIC ===
dmg:
  # Use LZFSE compression (best for macOS 10.11+/arm64)
  format: ULFO
  # Shrink to minimum size
  shrink: true
  # Don't sign DMG (not required, causes notarization issues)
  sign: false

afterPack: build/after-pack.cjs

publish:
  - provider: github
    owner: OCWorkforces
    repo: Amphetamine
    releaseType: release
