appId: com.ocworkforces.amphetamine
productName: Amphetamine

# === COMPRESSION ===
# Use maximum compression for distribution builds
compression: maximum

directories:
  output: dist
  buildResources: build

files:
  - lib/**/*
  - src/assets/**/*
  - package.json
  - assets/**/*
  - "!**/*.map"
  - "!**/node_modules"

# === ELECTRON LOCALES ===
# Only keep English (saves ~5-10MB)
electronLanguages:
  - en

mac:
  target:
    - target: dmg
      arch: arm64
    - target: zip
      arch: arm64
  # ARM64-only: minimum macOS version aligns with Apple Silicon debut
  minimumSystemVersion: "11.0.0"
  # No universal build - don't merge ASARs
  mergeASARs: false
  hardenedRuntime: false
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.inherit.plist
  extendInfo:
    LSUIElement: true
  notarize: false

# === DMG-SPECIFIC ===
dmg:
  # Use LZFSE compression (best for macOS 10.11+/arm64)
  format: ULFO
  # Shrink to minimum size
  shrink: true
  # Don't sign DMG (not required, causes notarization issues)
  sign: false

afterPack: build/after-pack.cjs
