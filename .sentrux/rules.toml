# Architectural constraints for Amphetamine
# Enforces layer separation between Electron processes

[[rules]]
name = "renderer-no-main-import"
description = "Renderer must not import from main process modules"
deny = ["src.renderer -> src.main"]

[[rules]]
name = "shared-leaf"
description = "Shared types cannot import from process-specific modules"
deny = [
  "src.shared -> src.main",
  "src.shared -> src.renderer",
  "src.shared -> src.preload",
]

[[rules]]
name = "preload-no-renderer"
description = "Preload must not import from renderer process"
deny = ["src.preload -> src.renderer"]

# Rules added after Phase 1-4 refactoring (constants extraction + DI decoupling)

[[rules]]
name = "settings-limited-fan-in"
description = "settings.ts should only be imported by coordinator and ipc — not by tray, shortcut, sleep-prevention, battery-monitor, or auto-launch (use DI instead)"
deny = [
  "src.main.tray -> src.main.settings",
  "src.main.shortcut -> src.main.settings",
  "src.main.global-shortcut -> src.main.settings",
  "src.main.sleep-prevention -> src.main.settings",
  "src.main.battery-monitor -> src.main.settings",
  "src.main.auto-launch -> src.main.settings",
  "src.main.auto-updater -> src.main.settings",
]

[[rules]]
name = "utils-leaf-modules"
description = "Utility modules must not import from application modules (they are leaves in the dependency graph)"
deny = [
  "src.main.utils -> src.main.coordinator",
  "src.main.utils -> src.main.settings",
]

[[rules]]
name = "constants-leaf"
description = "Constants module must not import from application modules (only electron and node builtins)"
deny = [
  "src.main.constants -> src.main.coordinator",
  "src.main.constants -> src.main.settings",
  "src.main.constants -> src.main.session-timer",
  "src.main.constants -> src.main.sleep-prevention",
  "src.main.constants -> src.main.battery-monitor",
  "src.main.constants -> src.main.settings-window",
  "src.main.constants -> src.main.security",
  "src.main.constants -> src.main.shortcut",
  "src.main.constants -> src.main.tray",
  "src.main.constants -> src.main.ipc",
  "src.main.constants -> src.main.auto-updater",
  "src.main.constants -> src.main.auto-launch",
]
