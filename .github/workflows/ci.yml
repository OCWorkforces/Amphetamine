name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '26.3.0'
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: "1.3.14"
      - run: bun install --frozen-lockfile
      - name: Guard against OCWorkforces string (org does not exist; security risk)
        run: |
          if grep -rn "OCWorkforces" src/; then
            echo "ERROR: 'OCWorkforces' string found in src/ (org does not exist on GitHub)"
            exit 1
          fi
      - run: bun run lint
      - run: bun run typecheck

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '26.3.0'
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: "1.3.14"
      - run: bun install --frozen-lockfile
      - run: bun run test

  build:
    needs: [lint, test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    strategy:
      matrix:
        include:
          - runs-on: macos-latest
            arch: arm64
          - runs-on: macos-15-intel
            arch: x64
      fail-fast: false
    runs-on: ${{ matrix.runs-on }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '26.3.0'
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: "1.3.14"
      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ runner.temp }}/.cache/electron
          key: ${{ runner.os }}-${{ matrix.arch }}-electron-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.arch }}-electron-
      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ runner.temp }}/.cache/electron-builder
          key: ${{ runner.os }}-${{ matrix.arch }}-electron-builder-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.arch }}-electron-builder-
      - run: bun install --frozen-lockfile
        env:
          ELECTRON_CACHE: ${{ runner.temp }}/.cache/electron
      - run: bun run build
      - name: Verify build artifacts
        run: |
          test -f lib/main/index.cjs || { echo 'ERROR: lib/main/index.cjs missing'; exit 1; }
          test -f lib/preload/index.cjs || { echo 'ERROR: lib/preload/index.cjs missing'; exit 1; }
      - run: bunx electron-builder --mac --${{ matrix.arch }}
        env:
          ELECTRON_CACHE: ${{ runner.temp }}/.cache/electron
          ELECTRON_BUILDER_CACHE: ${{ runner.temp }}/.cache/electron-builder
          CSC_IDENTITY_AUTO_DISCOVERY: false
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist-mac-${{ matrix.arch }}
          path: |
            dist/*.dmg
            dist/*.zip
          compression-level: 0
          retention-days: 14
