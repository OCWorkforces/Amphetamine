name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: "1.3.11"
      - run: bun install --frozen-lockfile
      - run: bun run lint
      - run: bun run typecheck

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: "1.3.11"
      - run: bun install --frozen-lockfile
      - run: bun run test

  build:
    needs: [lint, test]
    strategy:
      matrix:
        include:
          - runs-on: macos-latest
            arch: arm64
          - runs-on: macos-15-intel
            arch: x64
      fail-fast: false
    runs-on: ${{ matrix.runs-on }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: "1.3.11"
      - uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: ${{ runner.temp }}/.cache/electron
          key: ${{ runner.os }}-${{ matrix.arch }}-electron-${{ hashFiles('bun.lockb') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.arch }}-electron-
      - uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: ${{ runner.temp }}/.cache/electron-builder
          key: ${{ runner.os }}-${{ matrix.arch }}-electron-builder-${{ hashFiles('bun.lockb') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.arch }}-electron-builder-
      - run: bun install --frozen-lockfile
        env:
          ELECTRON_CACHE: ${{ runner.temp }}/.cache/electron
      - run: bun run build
      - run: bunx electron-builder --mac --${{ matrix.arch }}
        env:
          ELECTRON_CACHE: ${{ runner.temp }}/.cache/electron
          ELECTRON_BUILDER_CACHE: ${{ runner.temp }}/.cache/electron-builder
          CSC_IDENTITY_AUTO_DISCOVERY: false
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: dist-mac-${{ matrix.arch }}
          path: |
            dist/*.dmg
            dist/*.zip
          compression-level: 0
          retention-days: 14
